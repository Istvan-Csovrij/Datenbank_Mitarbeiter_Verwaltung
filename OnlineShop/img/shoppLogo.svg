<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <defs>
    <style>
      .border{stroke:#E6EDF6;stroke-width:3;fill:#fff}
      .brandBlue{fill:#2E90FF;font: 800 84px system-ui, -apple-system, Segoe UI, Roboto, Arial;}
      .brandDark{fill:#0F172A;font: 800 84px system-ui, -apple-system, Segoe UI, Roboto, Arial;}
      .tag{fill:#64748B;font: 400 28px system-ui, -apple-system, Segoe UI, Roboto, Arial;}
      .stroke{stroke:#2E90FF;stroke-width:10;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .fillLight{fill:#DBEEFF;stroke:#2E90FF;stroke-width:5;}
    </style>
  </defs>

  <!-- Badge -->
  <rect x="40" y="50" width="260" height="260" rx="80" class="border"/>
  <ellipse cx="150" cy="130" rx="95" ry="75" fill="rgba(46,144,255,0.10)"/>

  <!-- Bag icon -->
  <rect x="95" y="120" width="150" height="155" rx="30" class="stroke"/>
  <path d="M120 132c0-30 100-30 100 0" class="stroke"/>
  <path d="M128 140v20M222 140v20" class="stroke"/>

  <!-- Motif (simplified) -->
  <g transform="translate(0,0)">
    
  <line x1="142" y1="382" x2="370" y2="382" class="stroke"/>
  <rect x="146" y="284" width="52" height="98" rx="10" class="fillLight"/>
  <rect x="212" y="242" width="40" height="140" rx="10" class="fillLight"/>
  <rect x="266" y="270" width="52" height="112" rx="10" class="fillLight"/>
  <rect x="332" y="224" width="42" height="158" rx="10" class="fillLight"/>
  <circle cx="256" cy="420" r="10" fill="#2E90FF"/>

  </g>

  <!-- Wordmark -->
  <text x="340" y="175" class="brandBlue">City</text>
  <text x="505" y="175" class="brandDark">Shop</text>
  <text x="340" y="225" class="tag">Modern. Lokal. Einfach einkaufen.</text>

  <!-- Variant label -->
  <text x="1110" y="320" text-anchor="end" class="tag">Variante V1</text>
</svg>
